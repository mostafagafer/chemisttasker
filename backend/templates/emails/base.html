<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChemistTasker{% endblock %}</title>
    <style>
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse; }
        img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; display: block; }
        body { margin: 0; padding: 0; width: 100% !important; background: #eaf7f8; }
        h1, h2, h3, h4 { color: #0f3f46; margin: 0 0 14px; line-height: 1.25; font-family: Arial, sans-serif; }
        h1 { font-size: 24px; }
        h2 { font-size: 22px; }
        h3 { font-size: 18px; }
        h4 { font-size: 16px; }
        p { margin: 0 0 14px; line-height: 1.6; }
        a { color: #167b87; }
        ul { margin: 10px 0 16px; padding-left: 22px; }
        li { margin-bottom: 6px; }
        .btn, .cta {
            display: inline-block;
            background: #167b87;
            background-image: linear-gradient(135deg, #127f83 0%, #1aa7a6 58%, #6d3fc3 100%);
            color: #ffffff !important;
            padding: 13px 26px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            line-height: 1.2;
            margin: 16px 0;
        }
        .btn-secondary {
            display: inline-block;
            background: #e3f7f8;
            color: #167b87 !important;
            padding: 11px 20px;
            border: 1px solid #9ed7dc;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            margin: 8px 0 0;
        }
        .card, .meta {
            background: #f3fbfc;
            border: 1px solid #cdecee;
            border-radius: 10px;
            padding: 16px 18px;
            margin: 18px 0;
        }
        .slot-list {
            border-top: 1px solid #e5e7eb;
            margin: 14px 0 18px;
        }
        .slot-row {
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 0;
        }
        .slot-date {
            color: #111827;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
        }
        .slot-time {
            color: #475569;
            font-size: 14px;
            line-height: 1.5;
            padding-top: 2px;
        }
        .rate-pill {
            display: inline-block;
            background: #167b87;
            color: #ffffff;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 14px;
            font-weight: 800;
            white-space: nowrap;
        }
        .accent { color: #167b87; font-weight: 700; }
        .wave { color: #167b87; font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .emoji { color: #0f3f46; font-weight: 700; }
        blockquote {
            margin: 18px 0;
            padding: 0 0 0 16px;
            border-left: 4px solid #167b87;
            color: #475569;
        }
        @media only screen and (max-width: 640px) {
            .email-shell { width: 100% !important; }
            .email-padding { padding-left: 20px !important; padding-right: 20px !important; }
            .email-logo { width: 260px !important; max-width: 88% !important; }
        }
    </style>
</head>
<body style="margin:0; padding:0; width:100% !important; background:#eaf7f8;">
    <center style="width:100%; background:#eaf7f8;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%; background:#eaf7f8;">
            <tr>
                <td align="center" style="padding:28px 12px;">
                    <table role="presentation" class="email-shell" width="640" cellpadding="0" cellspacing="0" border="0" style="width:640px; max-width:640px; background:#ffffff; border:1px solid #cdecee; border-radius:14px; overflow:hidden;">
                        <tr>
                            <td class="email-padding" align="center" bgcolor="#127f83" style="padding:30px 28px 24px; background:#127f83; background-image:linear-gradient(135deg, #dff7f6 0%, #8bdedb 22%, #34beb8 46%, #127f83 72%, #6d3fc3 100%);">
                                <img
                                    class="email-logo"
                                    src="{{ email_logo_url|default:'cid:chemisttasker-logo-banner' }}"
                                    width="300"
                                    alt="ChemistTasker"
                                    style="display:block; width:300px; max-width:82%; height:auto; margin:0 auto 14px; border:0;"
                                >
                                <div style="font-family:Arial, sans-serif; color:#ffffff; font-size:15px; line-height:1.45; font-weight:700; text-shadow:0 1px 2px rgba(15,63,70,0.35);">
                                    Empowering pharmacy teams with smarter staffing, shifts, and community.
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="email-padding" style="padding:30px 28px; color:#14343a; font-family:Arial, sans-serif; font-size:15px; line-height:1.6;">
                                {% block content %}{% endblock %}
                            </td>
                        </tr>
                        <tr>
                            <td class="email-padding" align="center" bgcolor="#0d4f55" style="padding:28px 28px 22px; background:#0d4f55; color:#d8f2f4; font-family:Arial, sans-serif;">
                                <h3 style="color:#ffffff; margin:0 0 10px; font-size:18px; line-height:1.3; font-family:Arial, sans-serif;">Need help?</h3>
                                <p style="margin:0 0 10px; color:#d8f2f4; font-size:14px; line-height:1.5;">
                                    <a href="mailto:info@chemisttasker.com.au" style="color:#ffffff; text-decoration:underline;">info@chemisttasker.com.au</a>
                                </p>
                                <p style="margin:0 0 16px; color:#d8f2f4; font-size:14px; line-height:1.5;">
                                    <a href="https://www.chemisttasker.com.au" style="color:#ffffff; text-decoration:underline;">www.chemisttasker.com.au</a>
                                </p>
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center">
                                    <tr>
                                        <td style="padding:0 4px;"><a href="https://www.linkedin.com/company/chemisttasker" style="display:inline-block; width:34px; height:34px; border-radius:50%; background:#ffffff; color:#167b87; text-align:center; line-height:34px; font-size:14px; font-weight:800; text-decoration:none; font-family:Arial, sans-serif;">in</a></td>
                                        <td style="padding:0 4px;"><a href="https://www.instagram.com/chemisttasker" style="display:inline-block; width:34px; height:34px; border-radius:50%; background:#ffffff; color:#167b87; text-align:center; line-height:34px; font-size:14px; font-weight:800; text-decoration:none; font-family:Arial, sans-serif;">IG</a></td>
                                        <td style="padding:0 4px;"><a href="https://www.facebook.com/chemisttasker" style="display:inline-block; width:34px; height:34px; border-radius:50%; background:#ffffff; color:#167b87; text-align:center; line-height:34px; font-size:14px; font-weight:800; text-decoration:none; font-family:Arial, sans-serif;">f</a></td>
                                        <td style="padding:0 4px;"><a href="https://twitter.com/chemisttasker" style="display:inline-block; width:34px; height:34px; border-radius:50%; background:#ffffff; color:#167b87; text-align:center; line-height:34px; font-size:14px; font-weight:800; text-decoration:none; font-family:Arial, sans-serif;">X</a></td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        <tr>
                            <td class="email-padding" align="center" style="padding:14px 22px; background:#f3fbfc; color:#64748b; font-family:Arial, sans-serif; font-size:12px; line-height:1.5;">
                                &copy; {% now "Y" %} ChemistTasker. You are receiving this email because of your ChemistTasker account or activity.
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
